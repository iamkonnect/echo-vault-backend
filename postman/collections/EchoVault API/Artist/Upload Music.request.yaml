$kind: http-request
name: Upload Music
method: POST
url: '{{baseUrl}}/api/artist/upload-music'
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: formdata
  content:
    - key: title
      type: text
      value: My New Song
    - key: duration
      type: text
      value: '180'
