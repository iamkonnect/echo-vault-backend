$kind: http-request
name: Upload Music
method: POST
url: '{{baseUrl}}/api/artist/upload-music'
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{artistToken}}'
body:
  type: formdata
  content:
    - key: title
      type: text
      value: My Song Title
    - key: duration
      type: text
      value: '240'
    - key: file
      type: file
      src: ''
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 201 or 400", function () {
        pm.expect(pm.response.code).to.be.oneOf([201, 400]);
      });
      if (pm.response.code === 201) {
        pm.test("Response has song.id", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("song");
          pm.expect(json.song).to.have.property("id");
        });
      }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200 or 201", function () {
        pm.response.to.have.status([200, 201]);
      });
      
      pm.test("Response has success property", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("success");
      });
