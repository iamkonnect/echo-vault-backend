$kind: http-request
name: Upload Short
method: POST
url: '{{baseUrl}}/api/artist/upload-short'
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: formdata
  content:
    - key: title
      type: text
      value: My Short Video
    - key: duration
      type: text
      value: '30'
