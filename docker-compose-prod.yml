version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: echo-vault-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: echo_vault_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - echovault-network

  # Node.js Backend API
  backend:
    image: echo-vault-api:latest
    container_name: echo-vault-api
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-echovault_supersecret2024}
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-yourpassword}@postgres:5432/echo_vault_db?schema=public
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./public:/app/public
      - ./uploads:/app/uploads
    networks:
      - echovault-network
    restart: always

volumes:
  postgres_data:

networks:
  echovault-network:
    driver: bridge
