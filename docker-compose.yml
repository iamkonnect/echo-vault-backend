services:
  app:
    image: iamkonnect/echo-vault-backend:latest
    working_dir: /app
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/echo_vault_db?schema=public
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL}
    expose:
      - "5000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.echo-vault.rule=Host(`admin.echovaultz.com`)
      - traefik.http.routers.echo-vault.entrypoints=websecure
      - traefik.http.routers.echo-vault.tls=true
      - traefik.http.services.echo-vault.loadbalancer.server.port=5000
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/api/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - echo-vault-network

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: echo_vault_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - echo-vault-network

volumes:
  postgres_data:

networks:
  echo-vault-network:
    driver: bridge
