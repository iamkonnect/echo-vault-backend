services:
  app:
    build: .
    working_dir: /app
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./:/app
    expose:
      - "5000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.echo-vault.rule=Host(`admin.echovaultz.com`)
      - traefik.http.routers.echo-vault.entrypoints=websecure
      - traefik.http.routers.echo-vault.tls=true
      - traefik.http.services.echo-vault.loadbalancer.server.port=5000
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - echo-vault-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yourpassword}
      POSTGRES_DB: echo_vault_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - echo-vault-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  echo-vault-network:
    driver: bridge
